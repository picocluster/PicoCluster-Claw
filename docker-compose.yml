# PicoCluster Claw Docker Compose — runs on clusterclaw (RPi5)
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f
# Update: docker compose build --pull && docker compose up -d
#
# First-time setup:
#   sudo bash scripts/generate-pki.sh   # create CA + TLS certs
#   docker compose up -d
#
# User files are written to /home/picocluster/claw-files/ on the host:
#   openclaw/   — downloads, screenshots, agent-generated files
#   threadweaver/ — sandbox workspace files (shared with TW MCP tools)

services:
  threadweaver:
    image: ghcr.io/nosqltips/threadweaver:latest
    build: ./threadweaver
    container_name: threadweaver
    restart: always
    ports:
      - "127.0.0.1:5173:5173"
      - "127.0.0.1:8000:8000"
    environment:
      - LLM_PROVIDER=local
      - LOCAL_BASE_URL=http://crush:11434/v1
      - LOCAL_MODEL=${DEFAULT_MODEL:-granite4.1:8b}
      - LED_API_URL=http://host.docker.internal:7777
    extra_hosts:
      - "crush:${CRUSH_IP:-10.1.10.221}"
      - "clustercrush:${CRUSH_IP:-10.1.10.221}"
      - "host.docker.internal:host-gateway"
    volumes:
      - ./leds/mcp_server.py:/opt/mcp/led_server.py:ro
      - ./mcp:/opt/mcp/servers:ro
      - /home/picocluster/claw-files/threadweaver:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5173/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  openclaw:
    build: ./openclaw
    container_name: openclaw
    restart: always
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-picocluster-token}
      - LOCAL_BASE_URL=http://crush:11434/v1
      - LOCAL_MODEL=${DEFAULT_MODEL:-granite4.1:8b}
    extra_hosts:
      - "crush:${CRUSH_IP:-10.1.10.221}"
      - "clustercrush:${CRUSH_IP:-10.1.10.221}"
    volumes:
      - openclaw-data:/home/openclaw/.openclaw
      - /home/picocluster/claw-files/openclaw:/home/openclaw/files
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/__openclaw__/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  portal:
    image: nginx:alpine
    container_name: portal
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/picocluster/pki/ca.crt:/usr/share/nginx/html/ca.crt:ro
    extra_hosts:
      - "crush:${CRUSH_IP:-10.1.10.221}"

  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: always
    network_mode: "host"
    volumes:
      - ./openclaw/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/picocluster/pki:/etc/caddy/pki:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  openclaw-data:
  caddy-data:
  caddy-config:
