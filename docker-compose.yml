# PicoCluster Claw Docker Compose — runs on picocluster-claw (RPi5)
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f
# Update: docker compose build --pull && docker compose up -d

services:
  threadweaver:
    build: ./threadweaver
    container_name: threadweaver
    restart: always
    # Localhost-only binding: LAN clients must use the SSH tunnel + Caddy HTTPS on 5174.
    # Host-side consumers (Caddy reverse proxy, pc-status, LED daemon, update scripts)
    # still reach 127.0.0.1:5173 / 127.0.0.1:8000 via docker-proxy loopback.
    ports:
      - "127.0.0.1:5173:5173"
      - "127.0.0.1:8000:8000"
    environment:
      - LLM_PROVIDER=local
      - LOCAL_BASE_URL=http://picocrush:11434/v1
      - LOCAL_MODEL=${DEFAULT_MODEL:-llama3.2:3b}
      - LED_API_URL=http://host.docker.internal:7777
    extra_hosts:
      - "picocrush:${CRUSH_IP:-10.1.10.221}"
      - "host.docker.internal:host-gateway"
    volumes:
      - ./leds/mcp_server.py:/opt/mcp/led_server.py:ro
      - ./mcp:/opt/mcp/servers:ro
      - picocluster-claw-sandbox:/tmp/picocluster-claw-sandbox
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/settings"]
      interval: 30s
      timeout: 5s
      retries: 3

  openclaw:
    build: ./openclaw
    container_name: openclaw
    restart: always
    # Localhost-only binding: LAN clients must use the SSH tunnel + Caddy HTTPS on 18790.
    # Caddy (host network mode) reverse_proxies to 127.0.0.1:18789, still reachable.
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-picocluster-token}
      - LOCAL_BASE_URL=http://picocrush:11434/v1
      - LOCAL_MODEL=${DEFAULT_MODEL:-llama3.2:3b}
    extra_hosts:
      - "picocrush:${CRUSH_IP:-10.1.10.221}"
    volumes:
      - openclaw-data:/home/openclaw/.openclaw
    healthcheck:
      # /__openclaw__/canvas/ requires auth (401) and was a false-negative FAIL.
      # /__openclaw__/health returns 200 without auth.
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/__openclaw__/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  portal:
    image: nginx:alpine
    container_name: portal
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "picocrush:${CRUSH_IP:-10.1.10.221}"

  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: always
    network_mode: "host"
    volumes:
      - ./openclaw/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  openclaw-data:
  caddy-data:
  caddy-config:
  picocluster-claw-sandbox:
