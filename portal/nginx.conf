server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Health-check proxies so the portal's JS can check ThreadWeaver and OpenClaw
    # without the browser needing to reach their localhost-only ports directly.
    # These use the Docker network hostnames (threadweaver, openclaw) which
    # nginx resolves via Docker's embedded DNS.
    resolver 127.0.0.11 ipv6=off valid=30s;

    location = /healthz/threadweaver {
        proxy_pass http://threadweaver:8000/api/settings;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        access_log off;
    }

    location = /healthz/openclaw {
        proxy_pass http://openclaw:18789/__openclaw__/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        access_log off;
    }

    location = /healthz/ollama {
        proxy_pass http://threadweaver:8000/api/models/local;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        access_log off;
    }

    # CA cert download — must work over HTTP (bootstrap before cert trust is established)
    location = /ca.crt {
        alias /usr/share/nginx/html/ca.crt;
        add_header Content-Type "application/x-x509-ca-cert";
        add_header Content-Disposition 'attachment; filename="picocluster-ca.crt"';
        add_header Cache-Control "no-store";
    }
}
