---
# PicoClaw Cluster Provisioning
# Run from RPi5: ansible-playbook -i inventory/cluster.yml site.yml
#
# To provision only one node:
#   ansible-playbook -i inventory/cluster.yml site.yml --limit orin
#   ansible-playbook -i inventory/cluster.yml site.yml --limit rpi5

- name: Common setup for all nodes
  hosts: all
  become: yes
  roles:
    - common

- name: Orin Nano — llama.cpp inference server
  hosts: orin
  become: yes
  roles:
    - orin_inference

- name: RPi5 — OpenClaw agent orchestrator
  hosts: rpi5
  become: yes
  roles:
    - rpi5_openclaw
