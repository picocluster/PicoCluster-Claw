---
- name: Check if Node.js is installed
  command: node --version
  register: node_check
  changed_when: false
  failed_when: false

- name: Install Node.js {{ node_version }} via NodeSource
  when: node_check.rc != 0 or (node_check.stdout | regex_replace('v', '') is version('22.16', '<'))
  block:
    - name: Download NodeSource setup script
      get_url:
        url: "https://deb.nodesource.com/setup_{{ node_version }}.x"
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Run NodeSource setup
      command: bash /tmp/nodesource_setup.sh

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Clean up setup script
      file:
        path: /tmp/nodesource_setup.sh
        state: absent

- name: Verify Node.js version
  command: node --version
  register: node_version_check
  changed_when: false

- name: Display Node.js version
  debug:
    msg: "Node.js {{ node_version_check.stdout }}"

- name: Install OpenClaw globally
  npm:
    name: openclaw
    global: yes
    state: latest

- name: Verify OpenClaw is installed
  command: openclaw --version
  register: openclaw_version
  changed_when: false

- name: Display OpenClaw version
  debug:
    msg: "OpenClaw {{ openclaw_version.stdout }}"

- name: Configure swap (2GB for Pi 5 stability)
  block:
    - name: Install dphys-swapfile
      apt:
        name: dphys-swapfile
        state: present

    - name: Set swap size
      lineinfile:
        path: /etc/dphys-swapfile
        regexp: '^CONF_SWAPSIZE='
        line: "CONF_SWAPSIZE={{ swap_size_mb }}"
      notify: restart swap

- name: Create OpenClaw state directory
  file:
    path: "/home/{{ openclaw_user }}/.openclaw"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Deploy OpenClaw configuration
  template:
    src: openclaw-config.json.j2
    dest: "/home/{{ openclaw_user }}/.openclaw/openclaw.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0600'
  notify: restart openclaw

- name: Deploy OpenClaw systemd service
  copy:
    dest: /etc/systemd/system/openclaw.service
    content: |
      [Unit]
      Description=OpenClaw Gateway
      After=network.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ openclaw_user }}
      Environment=HOME=/home/{{ openclaw_user }}
      ExecStart=/usr/bin/openclaw gateway --port 18789
      Restart=always
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify:
    - reload systemd
    - restart openclaw

- name: Allow OpenClaw WebChat on LAN (token-authenticated)
  community.general.ufw:
    rule: allow
    port: "18789"
    proto: tcp
    comment: "OpenClaw WebChat/Gateway"

- name: Block OpenClaw internal ports from external access
  community.general.ufw:
    rule: deny
    port: "{{ item.port }}"
    proto: tcp
    comment: "{{ item.comment }}"
  loop:
    - { port: "18791", comment: "OpenClaw control service" }
    - { port: "18792", comment: "OpenClaw CDP relay" }

- name: Enable and start OpenClaw service
  systemd:
    name: openclaw
    enabled: yes
    state: started
