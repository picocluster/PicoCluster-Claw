---
- name: Create model directory
  file:
    path: "{{ model_dir }}"
    state: directory
    owner: "{{ llama_user }}"
    group: "{{ llama_user }}"
    mode: '0755'

- name: Download models
  get_url:
    url: "{{ item.url }}"
    dest: "{{ model_dir }}/{{ item.name }}"
    owner: "{{ llama_user }}"
    group: "{{ llama_user }}"
    mode: '0644'
    timeout: 600
  loop: "{{ orin_models }}"
  loop_control:
    label: "{{ item.name }}"
  register: model_download
  retries: 3
  delay: 10
  until: model_download is succeeded

- name: List downloaded models
  find:
    paths: "{{ model_dir }}"
    patterns: "*.gguf"
  register: downloaded_models

- name: Display downloaded models
  debug:
    msg: "{{ downloaded_models.files | map(attribute='path') | map('basename') | list }}"
