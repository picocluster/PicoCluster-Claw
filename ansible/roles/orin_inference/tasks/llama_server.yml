---
- name: Install llama.cpp build dependencies
  apt:
    name:
      - cmake
      - build-essential
      - libcurl4-openssl-dev
    state: present

- name: Check if llama-server binary exists
  stat:
    path: "{{ llama_server_bin }}"
  register: llama_bin

- name: Clone llama.cpp repository
  git:
    repo: https://github.com/ggerganov/llama.cpp.git
    dest: "{{ llama_cpp_dir }}"
    version: master
    depth: 1
  become_user: "{{ llama_user }}"
  when: not llama_bin.stat.exists

- name: Build llama.cpp with CUDA support
  shell: |
    cd {{ llama_cpp_dir }}
    mkdir -p build && cd build
    cmake .. -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=87
    make -j$(nproc)
  become_user: "{{ llama_user }}"
  when: not llama_bin.stat.exists
  async: 900
  poll: 30

- name: Verify llama-server binary was built
  stat:
    path: "{{ llama_server_bin }}"
  register: llama_bin_check
  failed_when: not llama_bin_check.stat.exists

- name: Deploy llama-server systemd service
  template:
    src: llama-server.service.j2
    dest: /etc/systemd/system/llama-server.service
    mode: '0644'
  notify: reload systemd

- name: Deploy llama-server environment file
  template:
    src: llama-server.env.j2
    dest: /etc/llama-server.env
    mode: '0644'
  notify: restart llama-server
