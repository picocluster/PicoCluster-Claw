---
- name: Verify CUDA is available
  command: nvidia-smi
  register: nvidia_smi
  changed_when: false
  failed_when: nvidia_smi.rc != 0

- name: Display GPU info
  debug:
    msg: "{{ nvidia_smi.stdout_lines[:5] }}"

- name: Set power mode to MAXN
  command: nvpmodel -m {{ nvpmodel_mode }}
  changed_when: false

- name: Enable max clocks
  command: jetson_clocks
  changed_when: false

- name: Persist power mode via systemd
  copy:
    dest: /etc/systemd/system/jetson-maxperf.service
    content: |
      [Unit]
      Description=Set Jetson to MAXN power mode
      After=multi-user.target

      [Service]
      Type=oneshot
      ExecStart=/usr/sbin/nvpmodel -m {{ nvpmodel_mode }}
      ExecStartPost=/usr/bin/jetson_clocks
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  notify: reload systemd

- name: Enable jetson-maxperf service
  systemd:
    name: jetson-maxperf
    enabled: yes
    state: started

- include_tasks: llama_server.yml
- include_tasks: models.yml

- name: Allow llama-server port from picoclaw only
  community.general.ufw:
    rule: allow
    port: "{{ llama_port }}"
    from_ip: "{{ hostvars[groups['rpi5'][0]]['ansible_host'] }}"
    comment: "llama-server from picoclaw"

- name: Start llama-server
  systemd:
    name: llama-server
    enabled: yes
    state: started

- name: Wait for llama-server to be ready
  uri:
    url: "http://127.0.0.1:{{ llama_port }}/health"
    method: GET
    return_content: yes
  register: health_check
  retries: 30
  delay: 5
  until: health_check.status == 200
