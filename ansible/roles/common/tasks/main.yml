---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base utilities
  apt:
    name: "{{ common_packages }}"
    state: present

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Configure /etc/hosts for cluster nodes
  blockinfile:
    path: /etc/hosts
    block: |
      {{ hostvars['claw']['ansible_host'] }}  claw
      {{ hostvars['crush']['ansible_host'] }}  crush
    marker: "# {mark} PICOCLUSTER MANAGED BLOCK"

- name: Ensure NVMe is mounted (Orin only)
  when: "'orin' in group_names"
  block:
    - name: Create NVMe mount point
      file:
        path: "{{ nvme_mount }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Add NVMe to fstab
      mount:
        path: "{{ nvme_mount }}"
        src: "{{ nvme_device }}"
        fstype: ext4
        opts: defaults,nofail
        state: mounted

