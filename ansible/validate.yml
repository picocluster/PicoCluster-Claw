---
# PicoClaw Cluster Validation / Smoke Tests
# Run from RPi5: ansible-playbook -i inventory/cluster.yml validate.yml

- name: Validate Orin Nano inference server
  hosts: orin
  become: no
  tasks:
    - name: Check llama-server service is active
      command: systemctl is-active llama-server
      register: llama_status
      changed_when: false

    - name: Display llama-server status
      debug:
        msg: "llama-server: {{ llama_status.stdout }}"

    - name: Check llama-server health endpoint
      uri:
        url: "http://127.0.0.1:{{ llama_port }}/health"
        return_content: yes
      register: health

    - name: Display health status
      debug:
        msg: "Health: {{ health.json }}"

    - name: List available models
      uri:
        url: "http://127.0.0.1:{{ llama_port }}/v1/models"
        return_content: yes
      register: models

    - name: Display loaded model
      debug:
        msg: "{{ models.json }}"

    - name: Run inference smoke test (1 token)
      uri:
        url: "http://127.0.0.1:{{ llama_port }}/v1/chat/completions"
        method: POST
        body_format: json
        body:
          model: "{{ llama_default_model }}"
          messages:
            - role: user
              content: "Say OK"
          max_tokens: 5
        return_content: yes
        timeout: 60
      register: inference_test

    - name: Display inference result
      debug:
        msg: "Inference test: {{ inference_test.json.choices[0].message.content }}"

    - name: Check GPU memory usage
      command: nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader
      register: gpu_mem
      changed_when: false

    - name: Display GPU memory
      debug:
        msg: "GPU Memory: {{ gpu_mem.stdout }}"

- name: Validate RPi5 OpenClaw agent
  hosts: rpi5
  become: no
  tasks:
    - name: Check OpenClaw service is active
      command: systemctl is-active openclaw
      register: openclaw_status
      changed_when: false

    - name: Display OpenClaw status
      debug:
        msg: "OpenClaw: {{ openclaw_status.stdout }}"

    - name: Verify OpenClaw version
      command: openclaw --version
      register: openclaw_ver
      changed_when: false

    - name: Display OpenClaw version
      debug:
        msg: "OpenClaw: {{ openclaw_ver.stdout }}"

    - name: Check Node.js version
      command: node --version
      register: node_ver
      changed_when: false

    - name: Display Node.js version
      debug:
        msg: "Node.js: {{ node_ver.stdout }}"

    - name: Test connectivity to Orin inference endpoint
      uri:
        url: "{{ llama_endpoint }}/models"
        return_content: yes
        timeout: 10
      register: remote_models

    - name: Display remote model access
      debug:
        msg: "RPi5 -> Orin inference: OK ({{ remote_models.json }})"

- name: Summary
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Cluster validation complete
      debug:
        msg:
          - "=== PicoClaw Cluster Validation ==="
          - "Orin Nano (10.1.10.240): llama-server running on port {{ llama_port }}"
          - "RPi5 (10.1.10.220): OpenClaw agent connected to inference endpoint"
          - "All checks passed."
