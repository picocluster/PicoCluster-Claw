---
# Orin Nano-specific variables
nvme_mount: /mnt/nvme
nvme_device: /dev/nvme0n1p1
llama_cpp_dir: "{{ nvme_mount }}/llama.cpp"
llama_server_bin: "{{ llama_cpp_dir }}/build/bin/llama-server"
model_dir: "{{ nvme_mount }}/models"
llama_user: picocluster

# Default model to load on boot
# Must match the .gguf filename — llama-server reports this as the model ID
llama_default_model: "Llama-3.2-3B-Instruct-Q4_K_M.gguf"
llama_ctx_size: 32768
llama_parallel: 1  # OpenClaw system prompt is ~20K tokens; parallel splits context per slot

# Power mode: 0=15W, 1=25W, 2=MAXN
nvpmodel_mode: 2

# Models to download
orin_models:
  - name: Llama-3.2-3B-Instruct-Q4_K_M.gguf
    url: https://huggingface.co/bartowski/Llama-3.2-3B-Instruct-GGUF/resolve/main/Llama-3.2-3B-Instruct-Q4_K_M.gguf
    size_bytes: 2019377216
  - name: Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf
    url: https://huggingface.co/bartowski/Meta-Llama-3.1-8B-Instruct-GGUF/resolve/main/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf
    size_bytes: 4920916480
  - name: Phi-3.5-mini-instruct-Q4_K_M.gguf
    url: https://huggingface.co/bartowski/Phi-3.5-mini-instruct-GGUF/resolve/main/Phi-3.5-mini-instruct-Q4_K_M.gguf
    size_bytes: 2394575360
  - name: Qwen2.5-3B-Instruct-Q4_K_M.gguf
    url: https://huggingface.co/bartowski/Qwen2.5-3B-Instruct-GGUF/resolve/main/Qwen2.5-3B-Instruct-Q4_K_M.gguf
    size_bytes: 2048016640
