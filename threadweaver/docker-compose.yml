# Standalone ThreadWeaver docker-compose (for testing without OpenClaw)
# For full PicoClaw deployment, use the root docker-compose.yml instead.

services:
  threadweaver:
    build: .
    container_name: threadweaver
    restart: always
    ports:
      - "5173:5173"
      - "8000:8000"
    environment:
      - LLM_PROVIDER=local
      - LOCAL_BASE_URL=http://picocrush:8080/v1
      - LOCAL_MODEL=${DEFAULT_MODEL:-Llama-3.2-3B-Instruct-Q4_K_M.gguf}
    extra_hosts:
      - "picocrush:${CRUSH_IP:-10.1.10.221}"
